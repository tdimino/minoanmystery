<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silk Threads</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Silk Threads</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Silk Threads — Flowing luminous wave lines
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_waveSpeed;',
    'uniform float u_lineCount;',
    'uniform vec2 u_mouse;',
    '',
    '// ── Hash for noise ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    '// ── Smooth value noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '#define S smoothstep',
    '',
    '// ── Single flowing line (inspired by Shadertoy technique) ──',
    'vec3 silkLine(vec2 uv, float speed, float height, vec3 c, float t) {',
    '  uv.y += S(1.0, 0.0, abs(uv.x)) * sin(t * speed + uv.x * height) * 0.2;',
    '  float lw = 0.06 * S(0.2, 0.9, abs(uv.x));',
    '  float l = S(lw, 0.0, abs(uv.y) - 0.004);',
    '  float fade = S(1.0, 0.3, abs(uv.x));',
    '  return l * c * fade;',
    '}',
    '',
    'void main() {',
    '  vec2 centerOff = vec2(0.0);',
    '  if (u_mouse.x > 0.0) {',
    '    vec2 mUV = u_mouse / u_res;',
    '    centerOff = (mUV - 0.5) * 0.3;',
    '  }',
    '  vec2 uv = (gl_FragCoord.xy - (0.5 + centerOff) * u_res.xy) / u_res.y;',
    '  float t = u_time * u_waveSpeed;',
    '  int lineCount = int(u_lineCount);',
    '',
    '  vec3 col = vec3(0.0);',
    '',
    '  for (int i = 0; i < 12; i++) {',
    '    if (i >= lineCount) break;',
    '    float fi = float(i);',
    '    float frac = fi / max(u_lineCount - 1.0, 1.0);',
    '',
    '    // Each line: slightly different speed and frequency',
    '    float speed = 1.0 + frac * 0.8;',
    '    float height = 4.0 + frac * 2.0;',
    '',
    '    // Color: warm amber through to soft lavender',
    '    vec3 lineCol = vec3(',
    '      0.2 + frac * 0.7,',
    '      0.2 + frac * 0.4,',
    '      0.3 + (1.0 - frac) * 0.15',
    '    );',
    '',
    '    // Subtle noise for organic variation',
    '    float nOff = noise(vec2(uv.x * 2.0 + fi * 3.7, t * 0.1 + fi)) * 0.015;',
    '',
    '    col += silkLine(uv + vec2(0.0, nOff), speed, height, lineCol, t);',
    '  }',
    '',
    '  // ── Vignette ──',
    '  float vig = 1.0 - dot(uv, uv) * 0.4;',
    '  col *= max(vig, 0.0);',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uWaveSpeed = gl.getUniformLocation(prog, 'u_waveSpeed');
  var uLineCount = gl.getUniformLocation(prog, 'u_lineCount');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');

  var waveSpeedVal = 1.0;
  var lineCountVal = 6.0;
  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  var mouseXVal = -1, mouseYVal = -1;
  canvas.addEventListener('mousemove', function(e) {
    mouseXVal = e.clientX * dpr;
    mouseYVal = (canvas.clientHeight - e.clientY) * dpr;
  });
  canvas.addEventListener('mouseleave', function() {
    mouseXVal = -1; mouseYVal = -1;
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, { passive: false });
  canvas.addEventListener('touchend', function() {
    mouseXVal = -1; mouseYVal = -1;
  });
  var needsResize = true;
  var running = true;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  var fpsFrameCount = 0;
  var fpsLastReport = -1;
  var FPS_REPORT_INTERVAL = 2000;

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    if (needsResize) resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform1f(uWaveSpeed, waveSpeedVal);
    gl.uniform1f(uLineCount, lineCountVal);
    gl.uniform2f(uMouse, mouseXVal, mouseYVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    fpsFrameCount++;
    if (fpsLastReport < 0) fpsLastReport = now;
    if (now - fpsLastReport >= FPS_REPORT_INTERVAL) {
      var fps = Math.round(fpsFrameCount / ((now - fpsLastReport) / 1000));
      window.parent.postMessage({ type: 'shader-fps', shader: 'silk-threads', fps: fps, resolution: canvas.width + 'x' + canvas.height }, '*');
      fpsFrameCount = 0;
      fpsLastReport = now;
    }
    requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  // ── Context loss handling (Safari requirement) ──
  canvas.addEventListener('webglcontextlost', function(e) {
    e.preventDefault();
  });
  canvas.addEventListener('webglcontextrestored', function() {
    requestAnimationFrame(render);
  });

  // ── Reduced-motion live toggle ──
  var motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
  motionQuery.addEventListener('change', function(e) {
    prefersReduced = e.matches;
    if (prefersReduced) { mouseXVal = -1.0; mouseYVal = -1.0; }
  });

  // ── PostMessage API ──
  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'param') {
      switch (e.data.name) {
        case 'WAVE_SPEED': waveSpeedVal = e.data.value; break;
        case 'LINE_COUNT': lineCountVal = e.data.value; break;
      }
    } else if (e.data.type === 'pause') {
      running = false;
    } else if (e.data.type === 'resume') {
      if (!running) { running = true; requestAnimationFrame(render); }
    } else if (e.data.type === 'destroy') {
      running = false;
      var ext = gl.getExtension('WEBGL_lose_context');
      if (ext) ext.loseContext();
    } else if (e.data.type === 'config') {
      if (e.data.label === false) {
        var lbl = document.querySelector('.label');
        if (lbl) lbl.style.display = 'none';
      }
    }
  });
})();
</script>
</body>
</html>
