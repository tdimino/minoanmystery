  var fragSrc = [

    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_crackSpeed;',
    'uniform float u_glowIntensity;',
    'uniform vec2 u_mouse;',
    '',
    '#define PI 3.14159265359',
    '',
    '// ── Hash primitives ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'vec2 hash2(vec2 p) {',
    '  return vec2(',
    '    fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453),',
    '    fract(sin(dot(p, vec2(269.5, 183.3))) * 43758.5453)',
    '  );',
    '}',
    '',
    '// ── Smooth value noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── FBM ──',
    'float fbm(vec2 p) {',
    '  float val = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.0;',
    '  for (int i = 0; i < 5; i++) {',
    '    val += amp * noise(p * freq);',
    '    freq *= 2.03;',
    '    amp *= 0.49;',
    '    p += vec2(1.7, 9.2);',
    '  }',
    '  return val;',
    '}',
    '',
    '// ── Domain-warped Voronoi ──',
    '// Returns: x = dist to nearest, y = edge dist (2nd - 1st), z = cell hash',
    '// Neighbor loop unrolled manually to avoid variable array indexing',
    'vec3 kintsugiVoronoi(vec2 p, float t, float warpAmt) {',
    '  // Domain warp the input coordinates',
    '  vec2 warp = vec2(',
    '    fbm(p * 0.8 + t * 0.05),',
    '    fbm(p * 0.8 + vec2(5.2, 1.3) + t * 0.04)',
    '  );',
    '  p += warp * warpAmt;',
    '',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  float minDist = 10.0;',
    '  float secondDist = 10.0;',
    '  vec2 nearestCell = vec2(0.0);',
    '',
    '  // Unrolled 5x5 neighbor search for organic crack shapes',
    '  // Row -2',
    '  { vec2 nb = vec2(-2.0, -2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2(-1.0, -2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 0.0, -2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 1.0, -2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 2.0, -2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',

    '  { vec2 nb = vec2(-1.0,  0.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 0.0,  0.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 1.0,  0.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 2.0,  0.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  // Row 1',
    '  { vec2 nb = vec2(-2.0,  1.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2(-1.0,  1.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 0.0,  1.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 1.0,  1.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 2.0,  1.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  // Row 2',
    '  { vec2 nb = vec2(-2.0,  2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2(-1.0,  2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 0.0,  2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 1.0,  2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 2.0,  2.0); vec2 cid = i + nb; vec2 h = hash2(cid); vec2 pt = nb + h * 0.85 + 0.075; pt.x += sin(t * 0.07 + h.x * 20.0) * 0.06; pt.y += cos(t * 0.06 + h.y * 20.0) * 0.06; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '',
    '  float edge = sqrt(secondDist) - sqrt(minDist);',
    '  return vec3(sqrt(minDist), edge, hash(nearestCell));',
    '}',
    '',
    '// ── Fine crack Voronoi (higher frequency, 3x3 neighborhood) ──',
    'vec3 fineVoronoi(vec2 p, float t) {',
    '  vec2 warp = vec2(',
    '    fbm(p * 1.2 + t * 0.03 + vec2(10.0)),',
    '    fbm(p * 1.2 + t * 0.04 + vec2(20.0, 5.0))',
    '  );',
    '  p += warp * 0.4;',
    '',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  float minDist = 10.0;',
    '  float secondDist = 10.0;',
    '  vec2 nearestCell = vec2(0.0);',
    '',
    '  // Unrolled 3x3',

    '  { vec2 nb = vec2(-1.0,  0.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(50.0)); vec2 pt = nb + h * 0.8 + 0.1; pt.x += sin(t * 0.05 + h.x * 15.0) * 0.04; pt.y += cos(t * 0.04 + h.y * 15.0) * 0.04; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',

    '// ── Micro-crack Voronoi (finest detail, 3x3) ──',
    'vec3 microVoronoi(vec2 p, float t) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',

    '  { vec2 nb = vec2(-1.0, -1.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 0.0, -1.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 1.0, -1.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2(-1.0,  0.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 0.0,  0.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 1.0,  0.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2(-1.0,  1.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 0.0,  1.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '  { vec2 nb = vec2( 1.0,  1.0); vec2 cid = i + nb; vec2 h = hash2(cid + vec2(200.0)); vec2 pt = nb + h * 0.75 + 0.125; pt.x += sin(t * 0.03 + h.x * 10.0) * 0.03; pt.y += cos(t * 0.025 + h.y * 10.0) * 0.03; float d = dot(pt - f, pt - f); if (d < minDist) { secondDist = minDist; minDist = d; nearestCell = cid; } else if (d < secondDist) { secondDist = d; } }',
    '',
    '  float edge = sqrt(secondDist) - sqrt(minDist);',
    '  return vec3(sqrt(minDist), edge, hash(nearestCell + vec2(200.0)));',
    '}',
    '',
    '// ── Kintsugi crack reveal — cracks appear, glow, heal, new ones form ──',
    'float crackReveal(float cellHash, float t) {',
    '  // Each crack region has its own phase',
    '  float phase = cellHash * PI * 2.0;',
    '  float cycle = t * 0.12;',
    '  // Slow breathing: cracks brighten and dim on overlapping cycles',
    '  float reveal = sin(cycle + phase) * 0.5 + 0.5;',
    '  reveal *= sin(cycle * 0.7 + phase * 1.3) * 0.3 + 0.7;',
    '  // Sharpen the reveal curve — more defined on/off',
    '  reveal = smoothstep(0.15, 0.65, reveal);',
    '  return reveal;',
    '}',
    '',
    '// ── Gold dust particles near cracks ──',
    'float goldDust(vec2 p, float t, float crackProximity) {',
    '  float dust = 0.0;',
    '  // Layer 1: small particles',
    '  vec2 dp1 = p * 30.0 + vec2(t * 0.2, t * 0.15);',
    '  float d1 = noise(dp1);',
    '  d1 = smoothstep(0.72, 0.78, d1);',
    '  dust += d1 * 0.6;',
    '  // Layer 2: tinier sparkles',
    '  vec2 dp2 = p * 55.0 + vec2(-t * 0.3, t * 0.25);',
    '  float d2 = noise(dp2);',
    '  d2 = smoothstep(0.78, 0.82, d2);',
    '  dust += d2 * 0.4;',
    '  // Layer 3: rare bright motes',
    '  vec2 dp3 = p * 18.0 + vec2(t * 0.08, -t * 0.12);',
    '  float d3 = noise(dp3);',
    '  d3 = smoothstep(0.82, 0.86, d3);',
    '  // Pulsing brightness',
    '  d3 *= 0.5 + 0.5 * sin(t * 2.0 + d3 * 20.0);',
    '  dust += d3 * 0.8;',
    '  // Particles only appear near cracks',
    '  dust *= crackProximity;',
    '  return dust;',
    '}',
    '',
    'void main() {',
    '  vec2 fragCoord = gl_FragCoord.xy;',
    '  vec2 p = (fragCoord - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  vec2 mouseShift = vec2(0.0);',
    '  if (u_mouse.x > 0.0) {',
    '    vec2 mNorm = (u_mouse / u_res - 0.5);',
    '    mouseShift = -mNorm * 0.12;',
    '  }',
    '  float t = u_time * u_crackSpeed;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 1. MULTI-SCALE VORONOI CRACK NETWORK',
    '  //    Each layer shifts differently for parallax depth',
    '  // ────────────────────────────────────────────',
    '',
    '  // Large primary cracks — foreground, least shift',
    '  vec3 coarse = kintsugiVoronoi((p + mouseShift * 0.8) * 2.5, t, 0.6);',
    '  float coarseEdge = coarse.y;',
    '  float coarseCellHash = coarse.z;',
    '',
    '  // Medium secondary cracks — middle depth',
    '  vec3 medium = fineVoronoi((p + mouseShift * 1.8) * 5.5, t);',
    '  float mediumEdge = medium.y;',
    '  float mediumCellHash = medium.z;',
    '',
    '  // Fine hairline cracks — deepest, most shift',
    '  vec3 micro = microVoronoi((p + mouseShift * 3.0) * 14.0, t);',
    '  float microEdge = micro.y;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 2. CRACK REVEAL ANIMATION',
    '  // Cracks appear, glow bright, then heal away',
    '  // ────────────────────────────────────────────',
    '',
    '  float coarseReveal = crackReveal(coarseCellHash, t);',
    '  float mediumReveal = crackReveal(mediumCellHash, t * 1.3 + 1.0);',
    '  // Micro-cracks follow the coarse ones',
    '  float microReveal = mix(coarseReveal, mediumReveal, 0.5);',
    '',
    '  // ────────────────────────────────────────────',
    '  // 3. CRACK LINE INTENSITIES',
    '  // Narrow bright core + wide soft glow falloff',
    '  // ────────────────────────────────────────────',
    '',
    '  // Coarse cracks: widest gold lines',
    '  float coarseCrack = smoothstep(0.08, 0.0, coarseEdge) * coarseReveal;',
    '  float coarseGlow  = smoothstep(0.22, 0.0, coarseEdge) * coarseReveal;',
    '  float coarseBloom = smoothstep(0.45, 0.0, coarseEdge) * coarseReveal;',
    '',
    '  // Medium cracks: thinner, subtler',
    '  float medCrack = smoothstep(0.06, 0.0, mediumEdge) * mediumReveal * 0.7;',
    '  float medGlow  = smoothstep(0.16, 0.0, mediumEdge) * mediumReveal * 0.5;',
    '',
    '  // Micro-cracks: hairline, very subtle',
    '  float microCrack = smoothstep(0.04, 0.0, microEdge) * microReveal * 0.25;',
    '  float microGlow  = smoothstep(0.10, 0.0, microEdge) * microReveal * 0.15;',
    '',
    '  // Combined crack intensities',
    '  float crackCore = max(coarseCrack, max(medCrack, microCrack));',
    '  float crackGlow = max(coarseGlow, max(medGlow, microGlow));',
    '  float crackBloom = coarseBloom;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 4. DARK CERAMIC SURFACE',
    '  // Subtle texture on the plates between cracks',
    '  // ────────────────────────────────────────────',
    '',
    '  // Base dark surface color',
    '  vec3 darkBase = vec3(0.03, 0.025, 0.02);',
    '  vec3 darkTex  = vec3(0.06, 0.045, 0.03);',
    '',
    '  // Subtle ceramic grain per Voronoi cell',
    '  float grain = fbm(p * 8.0 + coarseCellHash * 40.0);',
    '  float fineGrain = noise(p * 30.0 + mediumCellHash * 60.0) * 0.5;',
    '',
    '  // Surface varies subtly per plate',
    '  float plateTone = 0.3 + grain * 0.4 + fineGrain * 0.3;',
    '  vec3 surface = mix(darkBase, darkTex, plateTone);',
    '',
    '  // Plate edge highlight — subtle depth cue',
    '  vec3 plateHighlight = vec3(0.10, 0.07, 0.04);',
    '  float edgeHighlight = smoothstep(0.5, 0.15, coarse.x) * 0.3;',
    '  surface += plateHighlight * edgeHighlight;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 5. GOLDEN CRACK COLORING',
    '  // Bright molten gold core, warm amber falloff',
    '  // ────────────────────────────────────────────',
    '',
    '  vec3 goldCore   = vec3(1.0, 0.82, 0.55);',
    '  vec3 goldEdge   = vec3(0.78, 0.58, 0.24);',
    '  vec3 goldHot    = vec3(1.0, 0.92, 0.72);',
    '',
    '  // Molten gold flowing along cracks — turbulence texture',
    '  float flowTurb = fbm(p * 6.0 + t * vec2(0.08, -0.06));',
    '  float flowTurb2 = fbm(p * 10.0 + t * vec2(-0.05, 0.07) + vec2(30.0));',
    '  float moltenFlow = flowTurb * 0.6 + flowTurb2 * 0.4;',
    '',
    '  // Gold temperature varies along the crack',
    '  float goldTemp = crackCore * (0.6 + moltenFlow * 0.4);',
    '  goldTemp = clamp(goldTemp, 0.0, 1.0);',
    '',
    '  // Gold color gradient: edge -> core -> hot center',
    '  vec3 goldColor = mix(goldEdge, goldCore, smoothstep(0.2, 0.6, goldTemp));',
    '  goldColor = mix(goldColor, goldHot, smoothstep(0.6, 1.0, goldTemp));',
    '',
    '  // Emissive brightness for the crack core',
    '  float emissive = smoothstep(0.3, 1.0, crackCore);',
    '  goldColor += goldHot * emissive * emissive * 0.5;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 6. COMPOSITE: SURFACE + GOLD',
    '  // ────────────────────────────────────────────',
    '',
    '  // Warm glow cast onto surface near cracks',
    '  vec3 warmCast = goldEdge * crackGlow * 0.4 * u_glowIntensity;',
    '  surface += warmCast;',
    '',
    '  // Wider bloom — very subtle amber haze near cracks',
    '  surface += vec3(0.12, 0.08, 0.03) * crackBloom * 0.25 * u_glowIntensity;',
    '',
    '  // Blend gold into surface where cracks exist',
    '  float blendFactor = smoothstep(0.0, 0.12, crackCore);',
    '  vec3 col = mix(surface, goldColor, blendFactor);',
    '',
    '  // Additional glow layer on top (additive)',
    '  col += goldEdge * crackGlow * 0.3 * u_glowIntensity;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 7. GOLD DUST PARTICLES',
    '  // Tiny floating motes near crack lines',
    '  // ────────────────────────────────────────────',
    '',
    '  float crackProximity = smoothstep(0.5, 0.0, coarseEdge) * coarseReveal;',
    '  crackProximity = max(crackProximity, smoothstep(0.3, 0.0, mediumEdge) * mediumReveal * 0.5);',
    '  float dust = goldDust(p, u_time, crackProximity);',
    '  col += goldHot * dust * 0.35 * u_glowIntensity;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 8. SUBSURFACE WARMTH',
    '  // Faint gold glow beneath the surface even where cracks are fading',
    '  // ────────────────────────────────────────────',
    '',
    '  float subsurface = crackBloom * 0.15 * u_glowIntensity;',
    '  col += vec3(0.08, 0.05, 0.02) * subsurface;',
    '',
    '  // Slow global breathing — the gold pulses gently',
    '  float breathe = sin(u_time * 0.15) * 0.08 + 0.92;',
    '  col *= breathe;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 9. VIGNETTE',
    '  // ────────────────────────────────────────────',
    '',
    '  float edgeDist = length(p * vec2(1.0, 1.1));',
    '  float vignette = 1.0 - smoothstep(0.4, 1.3, edgeDist);',
    '  col *= 0.5 + vignette * 0.5;',
    '',
    '  // ────────────────────────────────────────────',
    '  // 10. TONE MAPPING + COLOR GRADING',
    '  // ────────────────────────────────────────────',
    '',
    '  // Soft tone map to preserve dark mood',
    '  col = col / (1.0 + col * 0.15);',
    '',
    '  // Push warm — darks stay neutral, golds stay rich',
    '  col = pow(col, vec3(0.95, 1.0, 1.1));',
    '',
    '  // Slight contrast enhancement',
    '  col = clamp(col, 0.0, 1.0);',
    '  col = col * col * (3.0 - 2.0 * col) * 0.7 + col * 0.3;',
    '',
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));',
    '  float alpha = smoothstep(0.06, 0.25, lum);',
    '  gl_FragColor = vec4(col, alpha);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uCrackSpeed = gl.getUniformLocation(prog, 'u_crackSpeed');
  var uGlowIntensity = gl.getUniformLocation(prog, 'u_glowIntensity');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');

  var mouseXVal = -1.0, mouseYVal = -1.0;
  var crackSpeedVal = 0.3;
  var glowIntensityVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;
  var needsResize = true;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  // ── Animation ──
  var lastTime = 0;
  var paused = false;

  // ── FPS telemetry ──
  var fpsFrameCount = 0;
  var fpsLastReport = -1;
  var FPS_REPORT_INTERVAL = 2000;

  function render(now) {
    if (!paused) {
    if (needsResize) resize();
      gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
      gl.uniform1f(uCrackSpeed, crackSpeedVal);
      gl.uniform1f(uGlowIntensity, glowIntensityVal);
      gl.uniform2f(uMouse, mouseXVal, mouseYVal);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      fpsFrameCount++;
      if (fpsLastReport < 0) fpsLastReport = now;
      if (now - fpsLastReport >= FPS_REPORT_INTERVAL) {
        var fps = Math.round(fpsFrameCount / ((now - fpsLastReport) / 1000));
        window.parent.postMessage({ type: 'shader-fps', shader: 'gilded-fracture', fps: fps, resolution: canvas.width + 'x' + canvas.height }, '*');
        fpsFrameCount = 0;
        fpsLastReport = now;
      }
    }
    requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  requestAnimationFrame(render);

  // ── Visibility pause ──
  document.addEventListener('visibilitychange', function() {
    paused = document.hidden;
    if (!paused) lastTime = 0;
  });

  canvas.addEventListener('mousemove', function(e) {
    mouseXVal = e.clientX * dpr;
    mouseYVal = (canvas.clientHeight - e.clientY) * dpr;
  });
  canvas.addEventListener('mouseleave', function() {
    mouseXVal = -1.0; mouseYVal = -1.0;
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, {passive: false});
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, {passive: false});
  canvas.addEventListener('touchend', function() {
    mouseXVal = -1.0; mouseYVal = -1.0;
  });

  // ── Context loss handling (Safari requirement) ──
  canvas.addEventListener('webglcontextlost', function(e) {
    e.preventDefault();
    paused = true;
  });
  canvas.addEventListener('webglcontextrestored', function() {
    paused = false;
    requestAnimationFrame(render);
  });

  // ── Reduced-motion live toggle ──
  var motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
  motionQuery.addEventListener('change', function(e) {
    prefersReduced = e.matches;
    if (prefersReduced) {
      mouseXVal = -1.0; mouseYVal = -1.0;
    }
  });

  // ── PostMessage API ──
  var rafId = null;
  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'param') {
      switch (e.data.name) {
        case 'CRACK_SPEED': crackSpeedVal = e.data.value; break;
        case 'GLOW_INTENSITY': glowIntensityVal = e.data.value; break;
      }
    } else if (e.data.type === 'pause') {
      paused = true;
    } else if (e.data.type === 'resume') {
      if (paused) { paused = false; requestAnimationFrame(render); }
    } else if (e.data.type === 'destroy') {
      paused = true;
      var ext = gl.getExtension('WEBGL_lose_context');
      if (ext) ext.loseContext();
    } else if (e.data.type === 'config') {
      if (e.data.label === false) {
        var lbl = document.querySelector('.label');
        if (lbl) lbl.style.display = 'none';
      }
    }
  });
})();
</script>
</body>
